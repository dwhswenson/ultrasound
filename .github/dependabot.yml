version: 2
updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * mon%2"
    groups:
      dev-deps:
        dependency-type: development
      prod-deps:
        dependency-type: production
    open-pull-requests-limit: 10
    commit-message:
      prefix: "npm"
      include: "scope"

  # Enable version updates for Terraform
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * mon%2"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "terraform"
      include: "scope"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 9 * * mon%2"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "actions"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"
